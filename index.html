<!DOCTYPE html>
<html>
<head>
  <title>CasinoX</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
    }

    .sidebar {
      width: 230px;
      background: #111827;
      padding: 15px;
      height: 100vh;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #60a5fa;
    }

    .menu button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      background: #1f2937;
      border: none;
      color: white;
      text-align: left;
      cursor: pointer;
      border-radius: 6px;
    }

    .main {
      flex: 1;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .battle {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cases {
      display: flex;
    }

    .case {
      width: 40px;
      height: 40px;
      margin: 3px;
      background: #374151;
      border-radius: 5px;
    }

    button {
      background: #3b82f6;
      border: none;
      padding: 8px 12px;
      color: white;
      cursor: pointer;
      border-radius: 6px;
    }

    input {
      padding: 8px;
      border-radius: 5px;
      border: none;
    }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="logo">🎲 CasinoX</div>

  <div class="menu">
    <button onclick="show('battles')">Case Battles</button>
    <button onclick="show('dice')">Dice</button>
  </div>
</div>

<div class="main">

  <!-- LOGIN -->
  <div id="login">
    <h2>Login</h2>
    <input id="u" placeholder="user">
    <input id="p" type="password" placeholder="pass">
    <button onclick="login()">Login</button>
  </div>

  <!-- APP -->
  <div id="app" style="display:none;">

    <div class="topbar">
      <div>Balance: <span id="bal"></span></div>
      <div id="online"></div>
    </div>

    <!-- CASE BATTLES LIST -->
    <div id="battles">

      <h2>Case Battles</h2>

      <div id="battleList"></div>

    </div>

    <!-- DICE -->
    <div id="dice" style="display:none;">
      <div class="card">
        <h3>Dice</h3>
        <input id="bet" type="number" placeholder="bet">
        <button onclick="roll()">Roll</button>
        <p id="diceResult"></p>
      </div>
    </div>

  </div>
</div>

<script>
const users = {
  a: { p: "1", b: 1000 },
  GOLDENBET: { p: "1234", b: 5000 }
};

let current = null;

function login() {
  let u = document.getElementById("u").value;
  let p = document.getElementById("p").value;

  if (users[u] && users[u].p === p) {
    current = u;
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    update();
    generateBattles();
  } else {
    alert("wrong login");
  }
}

function update() {
  document.getElementById("bal").innerText = users[current].b;
}

function show(section) {
  document.getElementById("battles").style.display = "none";
  document.getElementById("dice").style.display = "none";
  document.getElementById(section).style.display = "block";
}

// 🎲 Dice
function roll() {
  let bet = Number(document.getElementById("bet").value);

  if (Math.random() > 0.5) {
    users[current].b += bet;
    document.getElementById("diceResult").innerText = "WIN";
  } else {
    users[current].b -= bet;
    document.getElementById("diceResult").innerText = "LOSE";
  }

  update();
}

// ⚔️ Fake battle list (like screenshot)
function generateBattles() {
  let container = document.getElementById("battleList");
  container.innerHTML = "";

  for (let i = 0; i < 5; i++) {
    let div = document.createElement("div");
    div.className = "card battle";

    let cost = Math.floor(Math.random() * 5000);

    div.innerHTML = `
      <div>
        <div class="cases">
          <div class="case"></div>
          <div class="case"></div>
          <div class="case"></div>
          <div class="case"></div>
        </div>
        <small>Battle Cost: ${cost}</small>
      </div>
      <button onclick="joinBattle(${cost})">Join</button>
    `;

    container.appendChild(div);
  }
}

// Join battle
function joinBattle(cost) {
  let win = Math.random() > 0.5;

  if (win) {
    users[current].b += cost;
    alert("You WON the battle!");
  } else {
    users[current].b -= cost;
    alert("You LOST the battle!");
  }

  update();
}

// 🌐 Online counter
setInterval(() => {
  let num = Math.floor(Math.random() * 200) + 50;
  document.getElementById("online").innerText = num + " online";
}, 2000);
</script>

</body>
</html>
